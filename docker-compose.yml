services:
  backend:
    build:
      context: ./lms-backend
    container_name: lms-backend
    ports:
      - "5000:5000"
    volumes:
      - ./lms-backend:/app
      - /app/node_modules
    command: node server.js

  frontend:
    build:
      context: ./lms-frontend
    container_name: lms-frontend
    ports:
      - "5174:5174"
    volumes:
      - ./lms-frontend:/app
      - /app/node_modules
    command: npm run dev -- --host